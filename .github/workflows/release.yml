name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  verify-release-source:
    name: Verify tag belongs to main
    runs-on: ubuntu-24.04
    steps:
      - name: Check out tagged source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Require the tagged commit on main
        shell: bash
        run: |
          git fetch --no-tags origin main
          if ! git merge-base --is-ancestor HEAD origin/main; then
            echo "::error::Release tags must point to commits already present on origin/main."
            exit 1
          fi

  validate-data:
    name: Validate theme JSON
    needs: verify-release-source
    runs-on: ubuntu-24.04
    steps:
      - name: Check out tagged source and engine
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Validate JSON
        run: python scripts/validate-json.py

  build-unix:
    name: Build ${{ matrix.label }} release
    needs: verify-release-source
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            label: Linux
            script: linux
            package: linux-x64
          - runner: macos-15-intel
            label: macOS
            script: macos
            package: macos-x64
    steps:
      - name: Check out tagged source and engine
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake pkg-config \
            libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev \
            zlib1g-dev

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: brew install cmake pkg-config sdl2 sdl2_image sdl2_mixer sdl2_ttf zlib

      - name: Build and test Release
        shell: bash
        run: ./scripts/build-${{ matrix.script }}.sh --clean

      - name: Package Release
        shell: bash
        run: |
          bundle="four-winds-reborn-${GITHUB_REF_NAME}-${{ matrix.package }}"
          mkdir -p "release/${bundle}"
          cp four-winds-reborn README.md LICENSE "release/${bundle}/"
          cp -R themes "release/${bundle}/"
          tar -czf "release/${bundle}.tar.gz" -C release "${bundle}"

      - name: Upload Release package
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.package }}
          path: release/*.tar.gz
          retention-days: 7

  build-windows:
    name: Build Windows UCRT64 release
    needs: verify-release-source
    runs-on: windows-2022
    steps:
      - name: Check out tagged source and engine
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up MSYS2 UCRT64
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            git
            mingw-w64-ucrt-x86_64-toolchain
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-pkgconf
            mingw-w64-ucrt-x86_64-SDL2
            mingw-w64-ucrt-x86_64-SDL2_image
            mingw-w64-ucrt-x86_64-SDL2_mixer
            mingw-w64-ucrt-x86_64-SDL2_ttf
            mingw-w64-ucrt-x86_64-zlib

      - name: Build and test Release
        shell: msys2 {0}
        run: ./scripts/build-windows-msys2.sh --clean

      - name: Package Windows Release
        shell: pwsh
        run: |
          $bundle = "four-winds-reborn-$env:GITHUB_REF_NAME-windows-x64"
          $bundleRoot = Join-Path release $bundle
          New-Item -ItemType Directory -Force $bundleRoot | Out-Null
          Copy-Item dist/windows/* $bundleRoot -Recurse
          Copy-Item README.md, LICENSE $bundleRoot
          Compress-Archive -Path $bundleRoot -DestinationPath "release/$bundle.zip"

      - name: Upload Windows Release package
        uses: actions/upload-artifact@v7
        with:
          name: release-windows-x64
          path: release/*.zip
          retention-days: 7

  publish:
    name: Publish GitHub Release
    needs:
      - validate-data
      - build-unix
      - build-windows
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Download platform packages
        uses: actions/download-artifact@v8
        with:
          pattern: release-*
          path: release-artifacts
          merge-multiple: true

      - name: Generate SHA-256 checksums
        working-directory: release-artifacts
        run: sha256sum *.tar.gz *.zip > SHA256SUMS.txt

      - name: Publish tagged release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: >-
          gh release create "$GITHUB_REF_NAME"
          release-artifacts/*
          --verify-tag
          --generate-notes
          --title "Four Winds Reborn $GITHUB_REF_NAME"
